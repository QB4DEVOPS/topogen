# This workflow will install Python dependencies, run tests and lint with a
# variety of Python versions
#
# In addition, code coverage is reported to Coveralls
#
# For more information see:
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
#
# For using output and referencing it in other steps
# https://stackoverflow.com/questions/58033366/how-to-get-the-current-branch-within-github-actions#58035262

name: Python package

on: [push, pull_request]

jobs:
  changes:
    name: "Detect NaC-related changes"
    if: startsWith(github.ref, 'refs/heads/') || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      nac: ${{ steps.filter.outputs.nac }}
      cml2: ${{ steps.filter.outputs.cml2 }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nac:
              - 'src/topogen/nac.py'
              - 'src/topogen/render.py'
              - 'src/topogen/main.py'
              - 'src/topogen/templates/**'
              - 'tests/test_nac_*.py'
              - 'tests/conftest.py'
              - 'tests/fixtures/nac/**'
              - '.github/workflows/python-package.yml'
            cml2:
              - 'src/topogen/cml2.py'
              - 'src/topogen/main.py'
              - 'src/topogen/render.py'
              - 'tests/offline_flag_matrix.py'
              - 'tests/test_cml2_*.py'
              - 'tests/conftest.py'
              - 'scripts/validate-cml2-offline-matrix.py'
              - '.github/workflows/python-package.yml'

  build:
    name: "Build package"
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required due to the way Git works, without it this action won't be able to find any or the correct tags

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          # Install a specific version of uv.
          version: "0.7.9"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # - name: Create the version file
      #   run: |
      #     ./version.sh
      #     cat src/eve2cml/_version.py

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Check code
        run: |
          uv run mypy --check-untyped-def src
          uv run ruff check

      # - name: Run tests and check coverage
      #   run: |
      #     uv run coverage run -m pytest
      #     uv run coverage lcov
      #
      # - name: Code Coverage
      #   uses: coverallsapp/github-action@v2
      #   with:
      #     github-token: ${{ secrets.GITHUB_TOKEN }}
      #     path-to-lcov: coverage.lcov

  nac-terraform-plan:
    name: "NaC Terraform plan contract"
    needs: changes
    if: needs.changes.outputs.nac == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "0.7.9"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Terraform provider/module downloads
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: nac-tf-plugins-${{ runner.os }}-${{ hashFiles('src/topogen/nac.py') }}
          restore-keys: |
            nac-tf-plugins-${{ runner.os }}-

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run NaC terraform plan matrix (TG-161)
        env:
          TOPOGEN_TERRAFORM_PLAN: "1"
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/terraform-plugin-cache
        run: |
          mkdir -p "$TF_PLUGIN_CACHE_DIR"
          uv run pytest tests/test_nac_terraform_plan.py -m terraform -v

  cml2-terraform-plan:
    name: "CML2 Terraform plan contract"
    needs: changes
    if: needs.changes.outputs.cml2 == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "0.7.9"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Terraform provider/module downloads
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: cml2-tf-plugins-${{ runner.os }}-${{ hashFiles('src/topogen/cml2.py') }}
          restore-keys: |
            cml2-tf-plugins-${{ runner.os }}-

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run CML2 terraform plan matrix (40 cases)
        env:
          TOPOGEN_CML2_TERRAFORM_PLAN: "1"
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/terraform-plugin-cache
        run: |
          mkdir -p "$TF_PLUGIN_CACHE_DIR"
          uv run pytest tests/test_cml2_terraform_plan.py -m cml2_terraform -v
